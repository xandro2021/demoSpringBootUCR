<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Lista de Profesores</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        table {
            width: 50%;
            margin: auto;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        a {
            text-decoration: none;
            color: white;
            background: blue;
            padding: 5px;
            border-radius: 5px;
        }

        .delete {
            background: red;
        }
    </style>
    <!-- CSS propio -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- MENU -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">

            <a class="navbar-brand" href="#">UCR Siquirres</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link active" href="/">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/profesores">Profesores</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/cursos">Cursos</a>
                    </li>

                </ul>
            </div>

        </div>
    </nav>

    <h2 style="text-align:center">Lista de Profesores</h2>
    <table>
        <tr>
            <th>id</th>
            <th>Nombre</th>
            <th>Dirección</th>
            <th>Teléfono</th>
        </tr>
        <tr th:each="profesor : ${profesores}">
            <td th:text="${profesor.id}"></td>
            <td th:text="${profesor.name}"></td>
            <td th:text="${profesor.address}"></td>
            <td th:text="${profesor.phone}"></td>
            <td>
                <a th:href="@{/profesores/cursos/{id}(id=${profesor.id})}">Cursos</a>
                <a th:href="@{/profesores/editar/{id}(id=${profesor.id})}">Editar</a>
                <a th:href="@{/profesores/eliminar/{id}(id=${profesor.id})}" class="delete">Eliminar</a>
            </td>
        </tr>
    </table>
    <div style="text-align:center; margin-top: 20px;">
        <a href="/profesores/nuevo">Agregar Nuevo Profesor</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
