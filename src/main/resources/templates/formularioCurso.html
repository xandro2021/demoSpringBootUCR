<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario Curso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <h2 class="text-center mb-4" th:text="${curso.id != null} ? 'Editar Curso' : 'Nuevo Curso'"></h2>

            <form th:action="@{/cursos/guardar}" th:object="${curso}" method="post" class="card p-4 shadow">

                <div th:if="${curso.id != null}" class="mb-3">
                    <label class="form-label">ID</label>
                    <input type="text" class="form-control" th:field="*{id}" readonly>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nombre del curso *</label>
                    <input type="text" class="form-control" th:field="*{name}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Capacidad *</label>
                    <input type="number" class="form-control" th:field="*{capacity}" min="1" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Profesor *</label>
                    <select class="form-select" th:field="*{profesor.id}" required>
                        <option value="">-- Seleccionar profesor --</option>
                        <option th:each="prof : ${profesores}"
                                th:value="${prof.id}"
                                th:text="${prof.name}"></option>
                    </select>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>

            <div class="text-center mt-3">
                <a th:href="@{/cursos}" class="btn btn-secondary">Volver a lista</a>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
